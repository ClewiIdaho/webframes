<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🏆 MVP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060002;
    overflow: hidden;
  }

  /* === VOLCANIC ASH / EMBER FIELD === */
  body::before,
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  body::before {
    background:
      radial-gradient(1px 1px at 5% 10%, rgba(255,120,40,0.5), transparent),
      radial-gradient(1px 1px at 15% 45%, rgba(255,60,20,0.3), transparent),
      radial-gradient(1px 1px at 25% 80%, rgba(255,160,60,0.4), transparent),
      radial-gradient(1px 1px at 35% 20%, rgba(255,80,30,0.2), transparent),
      radial-gradient(1px 1px at 45% 60%, rgba(255,200,100,0.35), transparent),
      radial-gradient(1px 1px at 55% 35%, rgba(255,100,40,0.4), transparent),
      radial-gradient(1px 1px at 65% 75%, rgba(255,140,50,0.2), transparent),
      radial-gradient(1px 1px at 75% 15%, rgba(255,70,20,0.5), transparent),
      radial-gradient(1px 1px at 85% 55%, rgba(255,180,80,0.3), transparent),
      radial-gradient(1px 1px at 95% 90%, rgba(255,100,30,0.4), transparent),
      radial-gradient(1.5px 1.5px at 10% 70%, rgba(255,60,10,0.35), transparent),
      radial-gradient(1.5px 1.5px at 30% 30%, rgba(255,150,60,0.3), transparent),
      radial-gradient(1.5px 1.5px at 50% 92%, rgba(255,200,100,0.2), transparent),
      radial-gradient(1.5px 1.5px at 70% 48%, rgba(255,80,20,0.4), transparent),
      radial-gradient(1.5px 1.5px at 90% 25%, rgba(255,120,40,0.3), transparent);
    animation: ash-drift 5s ease-in-out infinite alternate;
  }

  body::after {
    background:
      radial-gradient(1px 1px at 8% 52%, rgba(255,100,30,0.4), transparent),
      radial-gradient(1px 1px at 18% 84%, rgba(255,50,10,0.2), transparent),
      radial-gradient(1px 1px at 28% 16%, rgba(255,160,60,0.3), transparent),
      radial-gradient(1px 1px at 38% 64%, rgba(255,80,20,0.4), transparent),
      radial-gradient(1px 1px at 48% 26%, rgba(255,200,100,0.2), transparent),
      radial-gradient(1px 1px at 58% 76%, rgba(255,120,40,0.3), transparent),
      radial-gradient(1px 1px at 68% 40%, rgba(255,60,10,0.5), transparent),
      radial-gradient(1px 1px at 78% 70%, rgba(255,140,50,0.2), transparent),
      radial-gradient(1px 1px at 88% 12%, rgba(255,90,25,0.4), transparent),
      radial-gradient(1px 1px at 98% 50%, rgba(255,180,70,0.3), transparent);
    animation: ash-drift 6s ease-in-out infinite alternate-reverse;
  }

  @keyframes ash-drift {
    0%   { opacity: 0.3; }
    100% { opacity: 0.9; }
  }

  .stage {
    position: relative;
    width: 400px;
    height: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* === PHOTO SLOT === */
  .photo-slot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: #0a0002;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .photo-slot span {
    color: rgba(255,100,40,0.1);
    font: bold 11px/1.3 sans-serif;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* === L1: INNER MOLTEN RING === */
  .molten-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 198px;
    height: 198px;
    border-radius: 50%;
    z-index: 9;
    pointer-events: none;
    animation: molten-pulse 2.5s ease-in-out infinite;
  }

  @keyframes molten-pulse {
    0%, 100% {
      box-shadow:
        inset 0 0 0 2px rgba(255,80,20,0.5),
        inset 0 0 10px rgba(255,50,10,0.3),
        0 0 0 2px rgba(255,80,20,0.4),
        0 0 15px rgba(255,60,10,0.2),
        0 0 35px rgba(200,30,0,0.1);
    }
    50% {
      box-shadow:
        inset 0 0 0 3px rgba(255,140,40,0.8),
        inset 0 0 20px rgba(255,100,20,0.5),
        0 0 0 4px rgba(255,140,40,0.65),
        0 0 25px rgba(255,100,20,0.4),
        0 0 60px rgba(255,60,10,0.15);
    }
  }

  /* LAVA CRACK RING */
  .lava-crack {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 202px;
    height: 202px;
    border-radius: 50%;
    z-index: 9;
    pointer-events: none;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255,120,30,0.6) 3deg,
      transparent 6deg,
      transparent 40deg,
      rgba(255,80,10,0.5) 42deg,
      transparent 45deg,
      transparent 90deg,
      rgba(255,160,50,0.4) 92deg,
      transparent 96deg,
      transparent 140deg,
      rgba(255,100,20,0.55) 142deg,
      transparent 146deg,
      transparent 200deg,
      rgba(255,140,40,0.5) 202deg,
      transparent 206deg,
      transparent 260deg,
      rgba(255,70,10,0.45) 262deg,
      transparent 266deg,
      transparent 310deg,
      rgba(255,120,30,0.5) 312deg,
      transparent 316deg,
      transparent 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent 88%, #000 92%, #000 100%, transparent 100%);
    mask: radial-gradient(farthest-side, transparent 88%, #000 92%, #000 100%, transparent 100%);
    animation: crack-rotate 6s linear infinite;
    filter: blur(1px);
  }

  @keyframes crack-rotate { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* === L2: VOLCANIC CORE GLOW === */
  .volcanic-core {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    background: conic-gradient(
      from 0deg,
      rgba(80,10,0,0) 0deg,
      rgba(200,50,10,0.45) 20deg,
      rgba(60,5,0,0) 45deg,
      rgba(255,100,20,0.35) 75deg,
      rgba(40,5,0,0) 105deg,
      rgba(180,40,5,0.4) 135deg,
      rgba(30,2,0,0) 165deg,
      rgba(255,80,15,0.35) 195deg,
      rgba(50,8,0,0) 225deg,
      rgba(200,60,10,0.3) 255deg,
      rgba(40,5,0,0) 285deg,
      rgba(255,120,30,0.4) 315deg,
      rgba(80,10,0,0) 360deg
    );
    filter: blur(28px);
    animation: core-swirl 14s linear infinite, core-surge 4s ease-in-out infinite;
  }

  @keyframes core-swirl { to { transform: translate(-50%,-50%) rotate(360deg); } }
  @keyframes core-surge {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.95; }
  }

  .volcanic-core-2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    height: 260px;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    background: conic-gradient(
      from 120deg,
      rgba(60,5,0,0) 0deg,
      rgba(255,80,10,0.35) 35deg,
      rgba(40,3,0,0) 75deg,
      rgba(180,40,5,0.3) 120deg,
      rgba(30,2,0,0) 170deg,
      rgba(255,120,30,0.4) 220deg,
      rgba(50,6,0,0) 270deg,
      rgba(200,50,8,0.3) 325deg,
      rgba(60,5,0,0) 360deg
    );
    filter: blur(22px);
    animation: core-swirl-2 20s linear infinite reverse;
    opacity: 0.55;
  }

  @keyframes core-swirl-2 { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* === L3: OBSIDIAN RING SYSTEM === */
  .obsidian-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(65deg);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    z-index: 6;
    pointer-events: none;
    border: 2.5px solid rgba(255,80,20,0.2);
    box-shadow:
      0 0 0 4px rgba(180,40,5,0.06),
      0 0 0 8px rgba(120,20,0,0.04),
      0 0 10px rgba(255,80,20,0.08);
    animation: obs-rotate 10s linear infinite;
  }

  @keyframes obs-rotate { to { transform: translate(-50%,-50%) rotateX(65deg) rotate(360deg); } }

  .obsidian-ring-2 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(65deg);
    width: 310px;
    height: 310px;
    border-radius: 50%;
    z-index: 5;
    pointer-events: none;
    border: 1px solid rgba(255,100,30,0.1);
    box-shadow: 0 0 0 3px rgba(200,50,10,0.04);
    animation: obs-rotate-2 14s linear infinite reverse;
  }

  @keyframes obs-rotate-2 { to { transform: translate(-50%,-50%) rotateX(65deg) rotate(360deg); } }

  /* === L4: FORGE HUD RING === */
  .forge-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 224px;
    height: 224px;
    z-index: 7;
    pointer-events: none;
    animation: forge-spin 7s linear infinite;
  }
  .forge-ring svg { width: 100%; height: 100%; overflow: visible; }

  @keyframes forge-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .forge-seg {
    fill: none;
    stroke: rgba(255,100,30,0.45);
    stroke-width: 2.5;
    stroke-linecap: butt;
    stroke-dasharray: 12 6 8 14;
  }

  .forge-seg-hot {
    fill: none;
    stroke: rgba(255,180,80,0.75);
    stroke-width: 1.5;
    stroke-linecap: butt;
    stroke-dasharray: 5 28;
    animation: forge-blink 1s steps(1) infinite;
  }

  @keyframes forge-blink {
    0%, 55% { stroke: rgba(255,180,80,0.75); }
    25%     { stroke: rgba(255,240,180,0.95); }
  }

  /* === L5: OUTER FORGE RING === */
  .forge-outer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 250px;
    z-index: 6;
    pointer-events: none;
    animation: forge-outer-spin 11s linear infinite reverse;
  }
  .forge-outer svg { width: 100%; height: 100%; overflow: visible; }

  @keyframes forge-outer-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .forge-outer-seg {
    fill: none;
    stroke: rgba(200,60,10,0.28);
    stroke-width: 1.5;
    stroke-dasharray: 18 12 6 14;
  }

  /* === L6: ORBITING TROPHY / WEAPON SHARDS === */
  .shard-orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 340px;
    height: 340px;
    z-index: 13;
    pointer-events: none;
  }

  .shard-orbit-1 { animation: shard-spin 9s linear infinite; }
  .shard-orbit-2 { animation: shard-spin 13s linear infinite reverse; }
  .shard-orbit-3 { animation: shard-spin 7s linear infinite; }

  @keyframes shard-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .shard-container {
    position: absolute;
    top: 50%;
    left: 50%;
  }

  .sdc1 { margin: -14px 0 0 -14px; transform: rotate(0deg)   translateX(170px); }
  .sdc2 { margin: -14px 0 0 -14px; transform: rotate(180deg) translateX(170px); }
  .sdc3 { margin: -14px 0 0 -14px; transform: rotate(60deg)  translateX(155px); }
  .sdc4 { margin: -14px 0 0 -14px; transform: rotate(240deg) translateX(155px); }
  .sdc5 { margin: -14px 0 0 -14px; transform: rotate(30deg)  translateX(185px); }

  .shard-piece {
    width: 28px;
    height: 28px;
    position: relative;
  }

  /* Flame sword shard */
  .shard-blade .blade-body {
    position: absolute;
    width: 6px;
    height: 22px;
    background: linear-gradient(180deg, #fff4e0, #ffaa40, #ff6010, #aa2000);
    clip-path: polygon(50% 0%, 100% 20%, 100% 85%, 50% 100%, 0% 85%, 0% 20%);
    top: 0;
    left: 11px;
    filter: drop-shadow(0 0 4px rgba(255,100,20,0.6));
    animation: blade-heat 1.5s ease-in-out infinite;
  }
  .shard-blade .blade-guard {
    position: absolute;
    width: 16px;
    height: 4px;
    background: linear-gradient(90deg, #8a4010, #cc7030, #8a4010);
    top: 18px;
    left: 6px;
    border-radius: 1px;
  }
  .shard-blade .blade-glow {
    position: absolute;
    width: 4px;
    height: 12px;
    background: rgba(255,200,100,0.5);
    top: 3px;
    left: 12px;
    filter: blur(2px);
    animation: blade-heat 1.5s ease-in-out infinite 0.3s;
  }

  @keyframes blade-heat {
    0%, 100% { opacity: 0.7; }
    50%      { opacity: 1; }
  }

  /* Crown shard */
  .shard-crown .crown-body {
    position: absolute;
    width: 22px;
    height: 14px;
    background: linear-gradient(180deg, #ffcc40, #dd8800, #884400);
    clip-path: polygon(0% 100%, 5% 40%, 20% 70%, 35% 20%, 50% 55%, 65% 10%, 80% 65%, 95% 30%, 100% 100%);
    top: 6px;
    left: 3px;
    filter: drop-shadow(0 0 4px rgba(255,160,40,0.5));
  }
  .shard-crown .crown-band {
    position: absolute;
    width: 22px;
    height: 5px;
    background: linear-gradient(180deg, #ffaa30, #996600);
    bottom: 4px;
    left: 3px;
    border-radius: 0 0 3px 3px;
  }
  .shard-crown .crown-gem {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ff4020;
    border-radius: 50%;
    top: 10px;
    left: 12px;
    box-shadow: 0 0 5px rgba(255,60,20,0.7);
    animation: gem-throb 1.2s ease-in-out infinite;
  }

  @keyframes gem-throb {
    0%, 100% { box-shadow: 0 0 5px rgba(255,60,20,0.7); }
    50%      { box-shadow: 0 0 10px rgba(255,100,40,0.9), 0 0 20px rgba(255,60,20,0.3); }
  }

  /* Shield shard */
  .shard-shield .shield-body {
    position: absolute;
    width: 20px;
    height: 22px;
    background: linear-gradient(180deg, #555, #333, #222);
    clip-path: polygon(50% 0%, 100% 12%, 100% 55%, 50% 100%, 0% 55%, 0% 12%);
    top: 3px;
    left: 4px;
    box-shadow: inset 0 0 8px rgba(255,80,20,0.2);
  }
  .shard-shield .shield-emblem {
    position: absolute;
    width: 10px;
    height: 10px;
    border: 2px solid rgba(255,120,40,0.6);
    border-radius: 50%;
    top: 8px;
    left: 9px;
    box-shadow: 0 0 6px rgba(255,100,30,0.3), inset 0 0 4px rgba(255,80,20,0.2);
  }

  /* === L7: EMBER STREAKS === */
  .ember-streaks {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    height: 350px;
    z-index: 2;
    pointer-events: none;
  }
  .ember-streaks svg { width: 100%; height: 100%; overflow: visible; }

  .estrk {
    fill: none;
    stroke-linecap: round;
    stroke-width: 1.5;
  }
  .es1  { stroke: rgba(255,120,30,0.45); stroke-dasharray: 18 62; animation: es-dash 1.4s linear infinite 0s; }
  .es2  { stroke: rgba(255,80,15,0.35);  stroke-dasharray: 14 72; animation: es-dash 1.9s linear infinite 0.2s; }
  .es3  { stroke: rgba(255,160,50,0.5);  stroke-dasharray: 22 52; animation: es-dash 1.1s linear infinite 0.4s; }
  .es4  { stroke: rgba(255,100,25,0.28); stroke-dasharray: 10 78; animation: es-dash 2.4s linear infinite 0.6s; }
  .es5  { stroke: rgba(255,200,80,0.4);  stroke-dasharray: 16 66; animation: es-dash 1.7s linear infinite 0.8s; }
  .es6  { stroke: rgba(255,70,10,0.38);  stroke-dasharray: 20 56; animation: es-dash 1.3s linear infinite 1.0s; }
  .es7  { stroke: rgba(255,140,40,0.45); stroke-dasharray: 12 70; animation: es-dash 2.1s linear infinite 0.3s; }
  .es8  { stroke: rgba(255,90,20,0.3);   stroke-dasharray: 26 48; animation: es-dash 1.5s linear infinite 0.5s; }
  .es9  { stroke: rgba(255,180,60,0.5);  stroke-dasharray: 8 82;  animation: es-dash 2.6s linear infinite 0.7s; }
  .es10 { stroke: rgba(255,110,30,0.38); stroke-dasharray: 14 64; animation: es-dash 1.2s linear infinite 0.9s; }
  .es11 { stroke: rgba(255,150,45,0.32); stroke-dasharray: 18 60; animation: es-dash 1.8s linear infinite 0.1s; }
  .es12 { stroke: rgba(255,80,15,0.48);  stroke-dasharray: 22 54; animation: es-dash 1.0s linear infinite 1.1s; }

  @keyframes es-dash { to { stroke-dashoffset: -100; } }

  /* === L8: ORBITING FIRE ORBS === */
  .fire-orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 310px;
    height: 310px;
    z-index: 11;
    pointer-events: none;
    animation: fire-spin 18s linear infinite;
  }

  @keyframes fire-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .fire-orb {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
  }

  .fo-1 {
    margin: -9px 0 0 -9px;
    transform: rotate(0deg) translateX(155px);
    width: 18px;
    height: 18px;
    background: radial-gradient(circle at 35% 35%, #ffe080, #ff8820, #cc3300);
    box-shadow: 0 0 10px rgba(255,100,20,0.6), 0 0 25px rgba(255,60,10,0.2);
  }
  .fo-2 {
    margin: -7px 0 0 -7px;
    transform: rotate(130deg) translateX(155px);
    width: 14px;
    height: 14px;
    background: radial-gradient(circle at 35% 35%, #ffaa40, #ee5500, #880000);
    box-shadow: 0 0 8px rgba(255,80,10,0.5), 0 0 20px rgba(200,40,0,0.2);
  }
  .fo-3 {
    margin: -5px 0 0 -5px;
    transform: rotate(240deg) translateX(155px);
    width: 10px;
    height: 10px;
    background: radial-gradient(circle at 35% 35%, #ffc060, #dd6600, #772200);
    box-shadow: 0 0 6px rgba(255,120,30,0.5), 0 0 16px rgba(220,60,10,0.2);
  }

  .fo-1::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) rotateX(70deg);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(255,120,30,0.25);
  }

  /* === L9: RISING EMBERS === */
  .ember {
    position: absolute;
    pointer-events: none;
    z-index: 12;
    opacity: 0;
  }

  .em1 { top: 85%; left: 15%;  animation: ember-rise 3.5s ease-out infinite 0s; }
  .em2 { top: 88%; left: 35%;  animation: ember-rise 4.0s ease-out infinite 0.5s; }
  .em3 { top: 82%; left: 55%;  animation: ember-rise 3.2s ease-out infinite 1.0s; }
  .em4 { top: 90%; left: 70%;  animation: ember-rise 4.5s ease-out infinite 0.3s; }
  .em5 { top: 86%; left: 25%;  animation: ember-rise 3.8s ease-out infinite 1.5s; }
  .em6 { top: 84%; left: 80%;  animation: ember-rise 3.0s ease-out infinite 0.8s; }
  .em7 { top: 88%; left: 45%;  animation: ember-rise 4.2s ease-out infinite 2.0s; }
  .em8 { top: 92%; left: 60%;  animation: ember-rise 3.6s ease-out infinite 1.3s; }

  .ember-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #ff8830;
    box-shadow: 0 0 4px rgba(255,100,20,0.7), 0 0 8px rgba(255,60,10,0.3);
  }

  .em2 .ember-dot, .em5 .ember-dot { width: 2px; height: 2px; background: #ffaa50; }
  .em4 .ember-dot, .em7 .ember-dot { width: 4px; height: 4px; background: #ff6010; }

  @keyframes ember-rise {
    0%   { opacity: 0; transform: translateY(0) translateX(0); }
    10%  { opacity: 1; }
    30%  { opacity: 0.9; transform: translateY(-50px) translateX(8px); }
    60%  { opacity: 0.5; transform: translateY(-140px) translateX(-5px); }
    80%  { opacity: 0.2; transform: translateY(-220px) translateX(10px); }
    100% { opacity: 0; transform: translateY(-320px) translateX(-8px); }
  }

  /* === L10: FIRE TRAILS === */
  .fire-layer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 360px;
    height: 360px;
    z-index: 3;
    pointer-events: none;
  }

  .fire-trail {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ffcc60;
    box-shadow: 0 0 4px rgba(255,150,40,0.6);
  }

  .fire-trail::after {
    content: "";
    position: absolute;
    top: 1px;
    right: 5px;
    width: 30px;
    height: 3px;
    background: linear-gradient(90deg, rgba(255,120,30,0.7), rgba(255,60,10,0.3), transparent);
    border-radius: 2px;
  }

  .ft-1 { top: 18%; left: -10%; animation: ft-fly 3.8s linear infinite 0s; }
  .ft-2 { top: 52%; left: -10%; animation: ft-fly 4.8s linear infinite 2s; }
  .ft-3 { top: 36%; left: -10%; animation: ft-fly 3.2s linear infinite 3.5s; }

  @keyframes ft-fly {
    0%   { transform: translateX(0) translateY(0); opacity: 0; }
    5%   { opacity: 1; }
    80%  { opacity: 0.6; }
    100% { transform: translateX(410px) translateY(-25px); opacity: 0; }
  }

  /* === L11: INFERNO GLOW === */
  .inferno-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 210px;
    height: 210px;
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
    animation: inferno-pulse 3s ease-in-out infinite;
  }

  @keyframes inferno-pulse {
    0%, 100% {
      box-shadow:
        0 0 25px 8px rgba(200,50,10,0.2),
        0 0 50px 14px rgba(160,30,0,0.12),
        0 0 90px 24px rgba(120,15,0,0.06);
    }
    50% {
      box-shadow:
        0 0 35px 12px rgba(255,90,20,0.35),
        0 0 65px 20px rgba(220,60,10,0.2),
        0 0 110px 32px rgba(180,40,5,0.1);
    }
  }

  /* === L12: RUNE RING === */
  .rune-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 330px;
    height: 330px;
    z-index: 4;
    pointer-events: none;
    animation: rune-spin 45s linear infinite;
    opacity: 0.22;
  }
  .rune-ring svg { width: 100%; height: 100%; }

  @keyframes rune-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* === L13: HEAT SCANNER === */
  .heat-scan {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 250px;
    height: 250px;
    border-radius: 50%;
    z-index: 7;
    pointer-events: none;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 345deg,
      rgba(255,100,20,0) 348deg,
      rgba(255,100,20,0.22) 354deg,
      rgba(255,100,20,0.06) 360deg
    );
    -webkit-mask: radial-gradient(farthest-side, transparent 60%, #000 70%, #000 100%);
    mask: radial-gradient(farthest-side, transparent 60%, #000 70%, #000 100%);
    animation: heat-spin 2.5s linear infinite;
  }

  @keyframes heat-spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  /* === L14: FLOATING POWER EMOJIS === */
  .power-float {
    position: absolute;
    pointer-events: none;
    z-index: 14;
    opacity: 0;
  }

  .pf1 { top: 12%; right: -3%; font-size: 18px; animation: pf-rise 5.5s ease-out infinite 0s; }
  .pf2 { top: 48%; left: -5%;  font-size: 14px; animation: pf-rise 4.8s ease-out infinite 0.8s; }
  .pf3 { top: 78%; right: -4%; font-size: 16px; animation: pf-rise 5.0s ease-out infinite 1.6s; }
  .pf4 { top: 32%; left: -2%;  font-size: 20px; animation: pf-rise 6.0s ease-out infinite 0.4s; }
  .pf5 { top: 62%; right: -6%; font-size: 15px; animation: pf-rise 4.5s ease-out infinite 1.2s; }

  @keyframes pf-rise {
    0%   { opacity: 0; transform: translateY(0) scale(0.4); }
    10%  { opacity: 1; transform: translateY(-10px) scale(1); }
    50%  { opacity: 0.7; transform: translateY(-60px) scale(0.9); }
    80%  { opacity: 0.2; transform: translateY(-110px) scale(0.6); }
    100% { opacity: 0; transform: translateY(-150px) scale(0.3); }
  }

  /* === L15: HEAT HAZE FLICKER === */
  .heat-flicker {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 230px;
    height: 230px;
    border-radius: 50%;
    z-index: 8;
    pointer-events: none;
    animation: h-flick 0.18s steps(3) infinite;
  }

  @keyframes h-flick {
    0%   { box-shadow: 0 0 6px 2px rgba(255,80,10,0.12); }
    33%  { box-shadow: 0 0 0 0 transparent; }
    66%  { box-shadow: 0 0 4px 1px rgba(255,120,30,0.08); }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* === L16: MVP BADGE === */
  .mvp-badge {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    text-align: center;
    white-space: nowrap;
  }

  .mvp-text {
    font: 900 16px/1 'Courier New', monospace;
    letter-spacing: 10px;
    color: rgba(255,160,50,0.95);
    text-shadow:
      0 0 6px rgba(255,100,20,0.7),
      0 0 18px rgba(255,60,10,0.4),
      0 0 40px rgba(200,30,0,0.2),
      0 1px 0 rgba(120,40,0,0.8);
    animation: mvp-blaze 2.5s ease-in-out infinite;
    position: relative;
  }

  .mvp-text::before,
  .mvp-text::after {
    content: "🔥";
    position: absolute;
    top: -2px;
    font-size: 14px;
    filter: drop-shadow(0 0 4px rgba(255,80,10,0.5));
  }
  .mvp-text::before { right: 100%; margin-right: 4px; }
  .mvp-text::after  { left: 100%;  margin-left: -2px; }

  .mvp-sub {
    font: bold 7px/1 'Courier New', monospace;
    letter-spacing: 3px;
    color: rgba(255,120,40,0.45);
    margin-top: 6px;
    text-shadow: 0 0 4px rgba(255,80,20,0.25);
  }

  @keyframes mvp-blaze {
    0%, 100% {
      text-shadow:
        0 0 6px rgba(255,100,20,0.7),
        0 0 18px rgba(255,60,10,0.4),
        0 0 40px rgba(200,30,0,0.2),
        0 1px 0 rgba(120,40,0,0.8);
      color: rgba(255,160,50,0.95);
    }
    50% {
      text-shadow:
        0 0 10px rgba(255,180,60,0.9),
        0 0 28px rgba(255,100,20,0.6),
        0 0 55px rgba(255,60,10,0.25),
        0 1px 0 rgba(120,40,0,0.8);
      color: rgba(255,220,120,1);
    }
  }

  /* === L17: BOTTOM STATUS === */
  .mvp-status {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    font: 7px/1.5 'Courier New', monospace;
    color: rgba(255,100,30,0.35);
    text-align: center;
    letter-spacing: 1px;
    white-space: nowrap;
    animation: mvp-status-flk 0.5s steps(1) infinite;
  }

  @keyframes mvp-status-flk {
    0%, 70% { opacity: 1; }
    35%     { opacity: 0.5; }
    85%     { opacity: 0; }
  }
</style>
</head>
